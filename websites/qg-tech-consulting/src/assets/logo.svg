<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé doré plus subtil -->
    <linearGradient id="refinedGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f8e08e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Structure principale en traits fins -->
  <g fill="none" stroke="url(#refinedGold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Les piliers extérieurs -->
    <path d="M 50,10 C 48,30 40,70 30,90" />
    <path d="M 50,10 C 52,30 60,70 70,90" />
    
    <!-- Les 3 plateformes (horizontales) -->
    <path d="M 46,28 L 54,28" stroke-width="1.2" />
    <path d="M 41,52 L 59,52" stroke-width="1.5" />
    <path d="M 33,82 L 67,82" stroke-width="1.8" />
    
    <!-- L'arche du bas -->
    <path d="M 38,90 Q 50,72 62,90" />
    
    <!-- Antenne -->
    <line x1="50" y1="5" x2="50" y2="10" stroke-width="1" />
  </g>
  
  <!-- Point de brillance (petit éclat) -->
  <circle cx="50" cy="28" r="1.5" fill="white" fill-opacity="0.6">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>